<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Amazon Product Crawler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f6f6f6;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover {
      background: #005bb5;
    }
    .result {
      margin-top: 16px;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 8px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .text-red { color: #d13434; }
    .text-green { color: #0d814c; }
  </style>
</head>
<body>

<div class="card">
  <h2>Amazon 产品爬虫</h2>
  <input 
    id="productUrl" 
    placeholder="输入 Amazon 产品链接 https://www.amazon.com/dp/XXX"
  >
  <button onclick="crawl()">开始爬取</button>
</div>

<div class="card">
  <h3>爬取结果</h3>
  <div id="result"></div>
</div>

<script>
  const API_URL = "http://localhost:3000/api/crawl";

  async function crawl() {
    const url = document.getElementById("productUrl").value.trim();
    const res = document.getElementById("result");

    if (!url) {
      res.innerHTML = `<span class="text-red">请输入 Amazon 产品 URL</span>`;
      return;
    }

    res.innerHTML = "⏳ 正在爬取，请稍候...";

    try {
      const resp = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      const data = await resp.json();

      if (!data.success) {
        res.innerHTML = `<span class="text-red">❌ ${data.message}</span>`;
        return;
      }

      res.innerHTML = `
✅ 爬取成功
🌐 伪装IP：${data.fakeIp}
📦 ASIN：${data.data.asin}
💰 价格：${data.data.price}
📝 标题：${data.data.title}
🔗 链接：${url}
      `;

    } catch (err) {
      res.innerHTML = `<span class="text-red">❌ 请求失败，请确保后端已启动</span>`;
    }
  }
</script>

</body>
</html>
