<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amzn Crawler</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui}
    body{max-width:800px;margin:50px auto;padding:0 20px;background:#f7f7f7}
    .card{background:white;padding:24px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px}
    button{width:100%;padding:12px;background:#0070f3;color:white;border:none;border-radius:8px;margin-top:12px;font-size:15px;cursor:pointer}
    .result{background:#f9f9f9;padding:18px;border-radius:8px;margin-top:16px;line-height:1.7}
    .section{margin:10px 0}
    .label{font-weight:bold;color:#333}
    .red{color:#d32f2f}
    .green{color:#0d814c}
    ul{padding-left:20px;margin:4px 0}
    li{margin:6px 0}
  </style>
</head>
<body>

<div class="card">
  <h2>Amzn 产品获取1.4</h2>
  <input id="url" placeholder="https://www.amzn.com/dp/XXX">
  <button onclick="startCrawl()">开始获取</button>
</div>

<div class="card">
  <h3>获取结果</h3>
  <div id="result"></div>
</div>

<script>
  async function startCrawl() {
    const url = document.getElementById("url").value.trim();
    const res = document.getElementById("result");

    if (!url) {
      res.innerHTML = '<span class="red">请输入 Amzn 产品链接</span>';
      return;
    }

    res.innerHTML = "正在获取，请稍候...";

    try {
      const resp = await fetch("/api/crawl", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      const data = await resp.json();
      const d = data.data;

      let html = `<div class="green">获取成功</div>`;
      html += `<div class="section">伪装IP：${data.fakeIp}</div>`;
      html += `<div class="section">产品链接：${url}</div>`;

      if(d.product_title) html += `<div class="section"><span class="label">产品标题：</span>${d.product_title}</div>`;
      if(d.apex_price) html += `<div class="section"><span class="label">到手价格：</span>${d.apex_price}</div>`;
      if(d.price_label) html += `<div class="section"><span class="label">价格：</span>${d.price_label}</div>`;
      if(d.availability) html += `<div class="section"><span class="label">库存状态：</span>${d.availability}</div>`;
      if(d.rating) html += `<div class="section"><span class="label">评分：</span>${d.rating}</div>`;
      if(d.review_count) html += `<div class="section"><span class="label">评论数：</span>${d.review_count}</div>`;

      if(d.top_highlight) html += `<div class="section"><span class="label">Top Highlights：</span>${d.top_highlight}</div>`;
      if(d.item_details) html += `<div class="section"><span class="label">Item Details：</span>${d.item_details}</div>`;
      if(d.features_and_specs) html += `<div class="section"><span class="label">Features & Specs：</span>${d.features_and_specs}</div>`;

      if(d.list_items && d.list_items.length > 0){
        html += `<div class="section"><span class="label">产品描述：</span><ul>`;
        d.list_items.forEach(item => { html += `<li>${item}</li>`; });
        html += `</ul></div>`;
      }

      if(d.category) html += `<div class="section"><span class="label">商品分类：</span>${d.category}</div>`;

      res.innerHTML = html;

    } catch (err) {
      res.innerHTML = '<span class="red">请求失败</span>';
    }
  }
</script>
</body>
</html>
