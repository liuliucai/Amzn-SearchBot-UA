<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Crawler</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui}
    body{max-width:700px;margin:50px auto;padding:0 20px;background:#f7f7f7}
    .card{background:white;padding:24px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
    input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px}
    button{width:100%;padding:12px;background:#0070f3;color:white;border:none;border-radius:8px;margin-top:12px;font-size:15px;cursor:pointer}
    .result{background:#f9f9f9;padding:18px;border-radius:8px;margin-top:16px;line-height:1.7}
    .red{color:#d32f2f}
    .green{color:#2e7d32}
  </style>
</head>
<body>

<div class="card">
  <h2>Amazon 产品爬虫</h2>
  <input id="url" placeholder="输入 Amazon 产品链接">
  <button onclick="startCrawl()">开始爬取</button>
</div>

<div class="card">
  <h3>爬取结果</h3>
  <div id="result"></div>
</div>

<script>
  async function startCrawl() {
    const url = document.getElementById("url").value.trim();
    const res = document.getElementById("result");

    if (!url) {
      res.innerHTML = '<span class="red">请输入 URL</span>';
      return;
    }

    res.innerHTML = "⏳ 正在爬取...";

    try {
      const resp = await fetch("/api/crawl", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      const data = await resp.json();

      if (!data.success) {
        res.innerHTML = `<span class="red">❌ ${data.message}</span>`;
        return;
      }

      res.innerHTML = `
✅ 爬取成功
🌐 伪装IP：${data.fakeIp}
📦 ASIN：${data.data.asin}
💰 价格：${data.data.price}
📝 标题：${data.data.title}
      `;
    } catch (e) {
      res.innerHTML = '<span class="red">请求失败</span>';
    }
  }
</script>
</body>
</html>
